name: 'Setup WARP'
description: 'Setup Cloudflare WARP with static routing to bypass runner'

runs:
  using: composite
  steps:
    - name: Install and Configure
      shell: bash
      run: |
        set -e
        # 1. 安装 Cloudflare WARP
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq
        sudo apt-get install -y -qq cloudflare-warp

        # 2. 注册并设置模式
        sudo warp-cli --accept-tos registration new >/dev/null 2>&1
        sudo warp-cli --accept-tos mode warp >/dev/null 2>&1

        # 3. 核心分流：强制 Runner 走主路由直连
        # 获取当前 Runner 出口网卡的真实 IP
        LAN=$(ip -4 route get 8.8.8.8 | grep -oP 'src \K\S+')
        # 添加高优先级路由规则 (pref 10)，确保流量优先走主路由表
        sudo ip -4 rule add from $LAN lookup main pref 10

        # 4. 连接 WARP
        sudo warp-cli --accept-tos connect >/dev/null 2>&1
        
        # 5. 生成旋转 IP 的脚本，复用同一个逻辑
        cat <<EOF | sudo tee /usr/local/bin/warp-rotate >/dev/null
        #!/bin/bash
        sudo warp-cli --accept-tos disconnect >/dev/null 2>&1
        sudo warp-cli --accept-tos registration new >/dev/null 2>&1
        sudo warp-cli --accept-tos connect >/dev/null 2>&1
        # 换完 IP 后确保分流规则依然有效
        LAN=\$(ip -4 route get 8.8.8.8 | grep -oP 'src \K\S+')
        sudo ip -4 rule add from \$LAN lookup main pref 10 2>/dev/null || true
        echo "IP rotated to: \$(curl -s https://api.ipify.org)"
        EOF
        sudo chmod +x /usr/local/bin/warp-rotate

        echo "Setup complete. Current IP: $(curl -s https://api.ipify.org)"
