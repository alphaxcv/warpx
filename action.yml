name: 'Setup WARP (proxy mode)'
description: 'Install Cloudflare WARP in proxy mode'

inputs:
  port:
    description: 'SOCKS5 proxy port'
    required: false
    default: '40000'

runs:
  using: composite
  steps:
    - name: Install and connect WARP
      shell: bash
      run: |
        set -e

        # 核心修复：强行挂起新版 Ubuntu 的 needrestart 机制，阻止其抛出 exit code 8
        export DEBIAN_FRONTEND=noninteractive
        export NEEDRESTART_SUSPEND=1

        echo ">>> [1/4] Installing cloudflare-warp dependencies & repo..."
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        
        sudo apt-get update -qq

        echo ">>> [2/4] Executing apt-get install..."
        # 双重保险，在命令行级别注入挂起变量
        sudo NEEDRESTART_SUSPEND=1 DEBIAN_FRONTEND=noninteractive apt-get install -y -qq cloudflare-warp

        echo ">>> [3/4] Starting warp-svc..."
        sudo systemctl enable --now warp-svc
        
        # 增加守护进程就绪状态轮询，防止配置命令下发过快导致连接失败
        for i in {1..10}; do
          if sudo warp-cli --accept-tos status >/dev/null 2>&1; then
            echo "warp-svc is fully initialized."
            break
          fi
          echo "Waiting for warp-svc socket..."
          sleep 1
        done

        echo ">>> [4/4] Configuring WARP into Proxy Mode..."
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode proxy
        sudo warp-cli --accept-tos proxy port ${{ inputs.port }}
        sudo warp-cli --accept-tos connect

        echo "========================================="
        echo "WARP successfully initialized in Proxy Mode on port ${{ inputs.port }}!"
        echo "========================================="
