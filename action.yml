name: 'Warp CLI Runner'
description: '安装并连接 Cloudflare Warp，可切换IP，运行 sh/py 文件并输出实时日志'
author: 'you'

inputs:
  script:
    description: '要运行的脚本文件路径 (.sh 或 .py)'
    required: false
    default: ''
  command:
    description: '直接运行的命令（与 script 二选一）'
    required: false
    default: ''
  switch_ip:
    description: '是否在运行前切换一次IP (true/false)'
    required: false
    default: 'true'
  python_version:
    description: 'Python 版本'
    required: false
    default: '3.11'

outputs:
  warp_ip:
    description: '当前 Warp 出口 IP'
    value: ${{ steps.warpinfo.outputs.ip }}

runs:
  using: 'composite'
  steps:
    # ---------- 1. 安装 Python（如果需要） ----------
    - name: Setup Python
      if: ${{ endsWith(inputs.script, '.py') }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    # ---------- 2. 安装 warp-cli ----------
    - name: Install Cloudflare Warp
      shell: bash
      run: |
        set -e
        echo "::group::安装 Cloudflare Warp"
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update
        sudo apt-get install -y cloudflare-warp
        echo "::endgroup::"

    # ---------- 3. 注册并连接 ----------
    - name: Connect Warp
      shell: bash
      run: |
        set -e
        echo "::group::连接 Warp"
        # 启动守护进程
        sudo systemctl enable --now warp-svc || sudo warp-svc &>/dev/null &
        sleep 5

        # 注册（如果还没注册）
        warp-cli --accept-tos registration new || true
        sleep 2

        # 设置为代理/全局模式（warp 表示全局 wireguard）
        warp-cli --accept-tos mode warp || true

        # 连接
        warp-cli --accept-tos connect
        sleep 5

        echo "连接状态："
        warp-cli --accept-tos status || true
        echo "::endgroup::"

    # ---------- 4. 可选：切换IP ----------
    - name: Switch IP
      if: ${{ inputs.switch_ip == 'true' }}
      shell: bash
      run: |
        echo "::group::切换 IP"
        echo "断开重连以切换出口 IP..."
        warp-cli --accept-tos disconnect
        sleep 3
        # 重新注册可以获得新身份（从而新 IP）
        warp-cli --accept-tos registration delete || true
        sleep 2
        warp-cli --accept-tos registration new || true
        sleep 2
        warp-cli --accept-tos mode warp || true
        warp-cli --accept-tos connect
        sleep 6
        warp-cli --accept-tos status || true
        echo "::endgroup::"

    # ---------- 5. 显示当前 IP ----------
    - name: Show Warp IP
      id: warpinfo
      shell: bash
      run: |
        echo "::group::当前出口 IP 信息"
        IP=$(curl -s --max-time 15 https://api.ipify.org || echo "unknown")
        echo "出口 IP: $IP"
        echo "ip=$IP" >> "$GITHUB_OUTPUT"
        echo "Cloudflare Trace:"
        curl -s --max-time 15 https://www.cloudflare.com/cdn-cgi/trace/ || true
        echo "::endgroup::"

    # ---------- 6. 运行脚本（实时日志） ----------
    - name: Run Script (realtime log)
      shell: bash
      run: |
        set -o pipefail
        echo "::group::运行任务"

        run_file() {
          local f="\$1"
          case "$f" in
            *.py)
              echo ">>> 运行 Python: $f"
              # -u 关闭缓冲，stdbuf 强制行缓冲 -> 实时日志
              stdbuf -oL -eL python -u "$f" 2>&1
              ;;
            *.sh)
              echo ">>> 运行 Shell: $f"
              chmod +x "$f" || true
              stdbuf -oL -eL bash "$f" 2>&1
              ;;
            *)
              echo "不支持的文件类型: $f"; exit 1
              ;;
          esac
        }

        if [ -n "${{ inputs.script }}" ]; then
          run_file "${{ inputs.script }}"
        elif [ -n "${{ inputs.command }}" ]; then
          echo ">>> 运行命令: ${{ inputs.command }}"
          stdbuf -oL -eL bash -c "${{ inputs.command }}" 2>&1
        else
          echo "未提供 script 或 command"
          exit 1
        fi

        echo "::endgroup::"
