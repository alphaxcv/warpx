name: Setup WARP
description: warp-cli mode warp in netns + registration rotate

inputs:
  stack:
    description: "ipv4, ipv6, or dual (mode warp uses dual tunnel by default)"
    required: false
    default: dual

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends curl gpg iproute2 iptables

        # 1) netns + veth（先建网络，再装 warp）
        sudo ip netns add warp 2>/dev/null || true
        sudo ip link del vh0 2>/dev/null || true
        sudo ip link add vh0 type veth peer name vn0
        sudo ip link set vn0 netns warp
        sudo ip addr add 10.200.1.1/24 dev vh0
        sudo ip link set vh0 up
        sudo ip netns exec warp ip addr add 10.200.1.2/24 dev vn0
        sudo ip netns exec warp ip link set vn0 up
        sudo ip netns exec warp ip link set lo up
        sudo ip netns exec warp ip route add default via 10.200.1.1
        sudo mkdir -p /etc/netns/warp
        echo "nameserver 1.1.1.1" | sudo tee /etc/netns/warp/resolv.conf >/dev/null
        sudo sysctl -w net.ipv4.ip_forward=1 >/dev/null
        sudo iptables -t nat -C POSTROUTING -s 10.200.0.0/16 -j MASQUERADE 2>/dev/null \
          || sudo iptables -t nat -A POSTROUTING -s 10.200.0.0/16 -j MASQUERADE

        # 2) 先写 drop-in，再装包，避免 warp-svc 在主机上全局启动
        sudo mkdir -p /etc/systemd/system/warp-svc.service.d
        printf '%s\n' '[Service]' 'NetworkNamespacePath=/var/run/netns/warp' \
          | sudo tee /etc/systemd/system/warp-svc.service.d/netns.conf >/dev/null

        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(. /etc/os-release && echo $VERSION_CODENAME) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cloudflare-warp

        sudo systemctl stop warp-svc 2>/dev/null || true
        sudo systemctl daemon-reload
        sudo systemctl restart warp-svc
        for _ in $(seq 1 30); do
          systemctl is-active --quiet warp-svc && break
          sleep 1
        done
        systemctl is-active --quiet warp-svc || { echo "warp-svc not running"; exit 1; }

        sudo tee /usr/local/bin/warp-rotate >/dev/null <<'EOF'
        #!/bin/bash
        ns() { ip netns exec warp warp-cli --accept-tos "$@"; }
        ns disconnect >/dev/null 2>&1 || true
        ns registration delete >/dev/null 2>&1 || true
        ns registration new >/dev/null 2>&1 || exit 1
        ns mode warp >/dev/null 2>&1 || exit 1
        ns connect >/dev/null 2>&1 || exit 1
        for _ in $(seq 1 30); do
          ns status 2>/dev/null | grep -q Connected && exit 0
          sleep 1
        done
        exit 1
        EOF
        sudo chmod +x /usr/local/bin/warp-rotate

        sudo warp-rotate || { echo "WARP connect failed"; exit 1; }

        echo "IPv4: $(sudo ip netns exec warp curl -4s --connect-timeout 5 https://api.ipify.org || echo N/A)"
        echo "IPv6: $(sudo ip netns exec warp curl -6s --connect-timeout 5 https://api64.ipify.org || echo N/A)"
