name: 'Setup Global WARP with GitHub Bypass'
description: 'Install and configure Cloudflare WARP in global mode while bypassing GitHub traffic.'

runs:
  using: composite
  steps:
    - name: Configure and Connect WARP
      shell: bash
      run: |
        set -e

        # 阻止 Ubuntu 24.04+ 因 needrestart 机制引发的 apt 换版报错
        export DEBIAN_FRONTEND=noninteractive
        export NEEDRESTART_SUSPEND=1

        echo "Adding Cloudflare WARP repository..."
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null

        echo "Updating package lists..."
        sudo apt-get update -qq

        echo "Installing cloudflare-warp..."
        sudo NEEDRESTART_SUSPEND=1 DEBIAN_FRONTEND=noninteractive apt-get install -y -qq cloudflare-warp

        echo "Starting warp-svc daemon..."
        sudo systemctl enable --now warp-svc

        echo "Waiting for daemon to initialize..."
        for i in {1..10}; do
          if sudo warp-cli --accept-tos status >/dev/null 2>&1; then break; fi
          sleep 1
        done

        echo "Registering WARP client..."
        sudo warp-cli --accept-tos registration new

        echo "Setting WARP mode to global tunnel..."
        sudo warp-cli --accept-tos mode warp

        # split tunnel 排除名单：这些域名走本地网络，不进 WARP（日志/Checkout 直连 GitHub）
        echo "Configuring split tunnel exclusions for GitHub..."
        GITHUB_BYPASS_HOSTS=(
          github.com
          api.github.com
          actions.githubusercontent.com
          githubassets.com
          pipelines.actions.githubusercontent.com
          vstoken.actions.githubusercontent.com
          objects.githubusercontent.com
          codeload.github.com
        )
        for host in "${GITHUB_BYPASS_HOSTS[@]}"; do
          sudo warp-cli --accept-tos tunnel host add "$host" || true
        done

        echo "Connecting to WARP..."
        sudo warp-cli --accept-tos connect

        echo "Verifying connection status..."
        for i in {1..15}; do
          if sudo warp-cli --accept-tos status | grep -q "Connected"; then
            echo "WARP connected successfully."
            break
          fi
          sleep 1
        done

        echo "Waiting for network routes to stabilize..."
        sleep 5

        echo "Current outbound IP:"
        curl -s --connect-timeout 5 https://api.ipify.org || echo "Unknown"

        echo "Creating warp-rotate utility..."
        echo '#!/bin/bash' | sudo tee /usr/local/bin/warp-rotate >/dev/null
        echo 'set -e' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'echo "Rotating WARP IP..."' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'sudo warp-cli --accept-tos disconnect' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'sleep 1' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'sudo warp-cli --accept-tos registration delete || true' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'sleep 1' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'sudo warp-cli --accept-tos registration new' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'sudo warp-cli --accept-tos connect' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'sleep 5' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'echo "New outbound IP:"' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo 'curl -s --connect-timeout 5 https://api.ipify.org || echo "Unknown"' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        sudo chmod +x /usr/local/bin/warp-rotate

        echo "WARP setup complete."
