name: Setup WARP
description: Official cloudflare-warp client, global mode (warp-cli mode warp) + system-level ip rule split-tunnel for GitHub's api/web/git/hooks IP ranges (auto-fetched from api.github.com/meta), so Actions logs/control-plane keep direct routing.
inputs:
  stack:
    description: "currently informational only; warp-cli does not expose a v4/v6-only mode switch"
    required: false
    default: dual
  rotate-times:
    description: "How many successful WARP rotate cycles to run after initial setup"
    required: false
    default: "1"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends curl gnupg lsb-release jq iproute2 coreutils

        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

        ARCH="$(dpkg --print-architecture)"
        CODENAME="$(lsb_release -cs)"
        echo "deb [arch=${ARCH} signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ ${CODENAME} main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cloudflare-warp

        sudo nohup warp-svc >/tmp/warp-svc.log 2>&1 &
        sleep 3

        sudo tee /usr/local/bin/warp-fetch-github-cidrs >/dev/null <<'F'
        #!/bin/bash
        set -euo pipefail
        OUT="${1:-/var/lib/cloudflare-warp/github-cidrs.txt}"
        sudo mkdir -p "$(dirname "$OUT")"
        META=$(timeout 15s curl -fsSL https://api.github.com/meta)
        echo "$META" | jq -r '
          (.api // []), (.web // []), (.git // []), (.hooks // [])
          | .[]
        ' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$' | sort -u > "$OUT"
        echo "[warp-fetch-github-cidrs] fetched $(wc -l < "$OUT") CIDR ranges -> $OUT" >&2
        F
        sudo chmod +x /usr/local/bin/warp-fetch-github-cidrs

        sudo tee /usr/local/bin/warp-apply-github-bypass >/dev/null <<'A'
        #!/bin/bash
        set -euo pipefail
        GH_CIDRS=/var/lib/cloudflare-warp/github-cidrs.txt
        TABLE=200
        PREF=100

        while ip rule show | grep -q "pref ${PREF} "; do
          R=$(ip rule show | grep "pref ${PREF} " | head -n1 | sed -E 's/^([0-9]+):.*/\1/')
          ip rule delete pref "$R" 2>/dev/null || break
        done
        ip route flush table "$TABLE" 2>/dev/null || true

        [ -f "$GH_CIDRS" ] || { echo "[warp-apply-github-bypass] warn: $GH_CIDRS missing, skip" >&2; exit 0; }

        while read -r cidr; do
          [ -z "$cidr" ] && continue
          ip rule add to "$cidr" table main pref "$PREF" 2>/dev/null || \
            echo "[warp-apply-github-bypass] warn: failed to add rule for $cidr" >&2
        done < "$GH_CIDRS"

        echo "[warp-apply-github-bypass] applied $(wc -l < "$GH_CIDRS") ip rules (pref $PREF -> main table)" >&2
        A
        sudo chmod +x /usr/local/bin/warp-apply-github-bypass

        sudo tee /usr/local/bin/warp-current-ip >/dev/null <<'I'
        #!/bin/bash
        set -euo pipefail
        timeout 8s curl -fsS https://api.ipify.org || true
        I
        sudo chmod +x /usr/local/bin/warp-current-ip

        sudo tee /usr/local/bin/warp-rotate >/dev/null <<'R'
        #!/bin/bash
        set -euo pipefail

        BEFORE_IP=$(warp-current-ip || true)
        [ -n "$BEFORE_IP" ] || BEFORE_IP="N/A"
        echo "[warp-rotate] before ip: $BEFORE_IP" >&2

        timeout 20s warp-cli --accept-tos disconnect >/dev/null 2>&1 || true
        timeout 20s warp-cli --accept-tos registration delete >/dev/null 2>&1 || true

        timeout 30s warp-cli --accept-tos registration new >/dev/null 2>&1
        timeout 20s warp-cli --accept-tos mode warp >/dev/null 2>&1
        timeout 30s warp-cli --accept-tos connect >/dev/null 2>&1

        for _ in $(seq 1 12); do
          if timeout 5s curl -s https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE '^warp=(on|plus)$'; then
            break
          fi
          sleep 1
        done

        warp-apply-github-bypass

        timeout 5s curl -s https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE '^warp=(on|plus)$'

        AFTER_IP=$(warp-current-ip || true)
        [ -n "$AFTER_IP" ] || AFTER_IP="N/A"
        echo "[warp-rotate] after  ip: $AFTER_IP" >&2

        if [ "$BEFORE_IP" = "$AFTER_IP" ] && [ "$AFTER_IP" != "N/A" ]; then
          echo "[warp-rotate] warn: egress IP unchanged this cycle" >&2
        fi
        R
        sudo chmod +x /usr/local/bin/warp-rotate

        sudo warp-fetch-github-cidrs

        ok=0
        for i in $(seq 1 5); do
          if sudo warp-rotate; then
            ok=1
            break
          fi
          sleep $((RANDOM % 8 + i * 2))
        done
        [ "$ok" -eq 1 ] || { echo "WARP failed"; cat /tmp/warp-svc.log; exit 1; }

        ROTATE_TIMES="${{ inputs.rotate-times }}"
        if ! [[ "$ROTATE_TIMES" =~ ^[1-9][0-9]*$ ]]; then
          echo "[setup-warp] invalid rotate-times='$ROTATE_TIMES', fallback to 1" >&2
          ROTATE_TIMES=1
        fi

        if [ "$ROTATE_TIMES" -gt 1 ]; then
          echo "[setup-warp] running additional rotate cycles: $((ROTATE_TIMES - 1))" >&2
          for n in $(seq 2 "$ROTATE_TIMES"); do
            echo "[setup-warp] rotate cycle $n/$ROTATE_TIMES" >&2
            sudo warp-rotate || { echo "[setup-warp] rotate cycle $n failed" >&2; cat /tmp/warp-svc.log; exit 1; }
          done
        fi

        echo "WARP is up (global mode via warp-cli)."
        echo "GitHub IP ranges bypassed via system-level ip rule -- Actions logging stays on the direct route."
        echo "Exit IP (via WARP): $(sudo warp-current-ip || echo N/A)"
