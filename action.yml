name: 'Setup Global WARP (Runner Bypassed)'
description: 'Install Cloudflare WARP in global mode, using routing rules to bypass the runner and keep logs LIVE.'

runs:
  using: composite
  steps:
    - name: Configure and Connect WARP
      shell: bash
      run: |
        set -e

        export DEBIAN_FRONTEND=noninteractive
        export NEEDRESTART_SUSPEND=1

        echo "Adding Cloudflare WARP repository..."
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        
        echo "Updating package lists..."
        sudo apt-get update -qq

        echo "Installing cloudflare-warp..."
        sudo apt-get install -y -qq cloudflare-warp

        echo "Starting warp-svc daemon..."
        sudo systemctl restart warp-svc
        sleep 3

        echo "Registering WARP client (with timeout protection)..."
        # 【核心修复】加入超时切断和重试机制，防止 API 握手死锁
        REGISTERED=0
        for attempt in {1..5}; do
          echo "Registration attempt $attempt/5..."
          # 限制 15 秒必须返回结果，否则强制掐断重试
          if timeout 15 sudo warp-cli --accept-tos registration new; then
            REGISTERED=1
            break
          fi
          echo "Attempt $attempt timed out or failed. Restarting daemon..."
          sudo systemctl restart warp-svc
          sleep 3
        done

        if [ $REGISTERED -ne 1 ]; then
          echo "ERROR: WARP failed to register after 5 attempts."
          exit 1
        fi

        echo "Setting WARP mode to global tunnel..."
        sudo warp-cli --accept-tos mode warp

        echo "Connecting to WARP..."
        sudo warp-cli --accept-tos connect

        echo "Verifying connection status..."
        for i in {1..15}; do
          if sudo warp-cli --accept-tos status | grep -q "Connected"; then
            echo "WARP connected successfully."
            break
          fi
          sleep 1
        done

        echo "Applying Runner bypass routing..."
        # 强制 Runner 进程绑定的本地 IP 走主路由表直连
        LAN=$(ip -4 route get 8.8.8.8 | grep -oP 'src \K\S+')
        sudo ip -4 rule add from $LAN lookup main 2>/dev/null || true

        echo "Waiting for network routes to stabilize..."
        sleep 5

        CURRENT_IP=$(curl -s --connect-timeout 5 https://api.ipify.org || echo "Unknown")
        echo "Current outbound IP: $CURRENT_IP"

        echo "Creating warp-rotate utility..."
        echo "sudo warp-cli --accept-tos disconnect >/dev/null 2>&1" | sudo tee /usr/local/bin/warp-rotate >/dev/null
        echo "sleep 1" | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo "sudo warp-cli --accept-tos registration new >/dev/null 2>&1" | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo "sudo warp-cli --accept-tos connect >/dev/null 2>&1" | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo "sleep 5" | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo "LAN=\$(ip -4 route get 8.8.8.8 | grep -oP 'src \K\S+')" | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo "sudo ip -4 rule add from \$LAN lookup main 2>/dev/null || true" | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo "NEW_IP=\$(curl -s --connect-timeout 5 https://api.ipify.org || echo 'Unknown')" | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo "echo \"New outbound IP: \$NEW_IP\"" | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        
        sudo chmod +x /usr/local/bin/warp-rotate

        echo "WARP setup complete."
