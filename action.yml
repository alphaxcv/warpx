name: Setup WARP
description: Global WARP + GitHub bypass (live logs) + warp-rotate

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1
        GITHUB="github.com api.github.com actions.githubusercontent.com githubassets.com pipelines.actions.githubusercontent.com vstoken.actions.githubusercontent.com objects.githubusercontent.com codeload.github.com results-receiver.actions.githubusercontent.com"

        warp() { sudo warp-cli --accept-tos "$@" >/dev/null; }
        github_bypass() {
          for h in $GITHUB; do warp tunnel host add "$h" 2>/dev/null || true; done
        }

        echo "[1/3] Install cloudflare-warp"
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq
        sudo NEEDRESTART_SUSPEND=1 apt-get install -y cloudflare-warp
        sudo systemctl enable --now warp-svc
        sleep 3

        echo "[2/3] Global WARP (GitHub bypassed for live logs)"
        warp registration new
        warp mode warp
        github_bypass
        warp connect
        sleep 3
        echo "Exit IP: $(curl -sf --connect-timeout 5 https://api.ipify.org || echo unknown)"
        curl -sf --connect-timeout 5 https://cloudflare.com/cdn-cgi/trace | grep -E '^(warp|ip)=' || true

        echo "[3/3] Install warp-rotate"
        printf '%s\n' \
          '#!/bin/bash' \
          'set -e' \
          'GITHUB="github.com api.github.com actions.githubusercontent.com githubassets.com pipelines.actions.githubusercontent.com vstoken.actions.githubusercontent.com objects.githubusercontent.com codeload.github.com results-receiver.actions.githubusercontent.com"' \
          'echo "Rotating WARP IP..."' \
          'sudo warp-cli --accept-tos disconnect >/dev/null' \
          'sleep 1' \
          'sudo warp-cli --accept-tos registration delete || true' \
          'sleep 1' \
          'sudo warp-cli --accept-tos registration new >/dev/null' \
          'sudo warp-cli --accept-tos mode warp >/dev/null' \
          'for h in $GITHUB; do sudo warp-cli --accept-tos tunnel host add "$h" >/dev/null 2>&1 || true; done' \
          'sudo warp-cli --accept-tos connect >/dev/null' \
          'sleep 3' \
          'echo -n "New IP: "' \
          'curl -sf --connect-timeout 5 https://api.ipify.org || echo unknown' \
          | sudo tee /usr/local/bin/warp-rotate >/dev/null
        sudo chmod +x /usr/local/bin/warp-rotate
        echo "Done."
