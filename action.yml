name: Setup WARP (Ultra-Minimalist)
description: "Minimalist WARP setup without system tampering"

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        # 1. 仅下载并解压文件，彻底避免 apt-get 的所有副作用
        curl -L -o warp.deb https://pkg.cloudflareclient.com/pool/main/c/cloudflare-warp/cloudflare-warp_2024.1.285.0_amd64.deb
        ar x warp.deb data.tar.xz
        tar -xf data.tar.xz ./usr/bin/warp-cli ./usr/bin/warp-svc
        sudo mv usr/bin/warp-cli usr/bin/warp-svc /usr/local/bin/
        
        # 2. 设置网络命名空间
        sudo ip netns add warp_ns
        sudo ip link add veth-host type veth peer name veth-warp
        sudo ip link set veth-warp netns warp_ns
        sudo ip addr add 10.200.200.1/24 dev veth-host && sudo ip link set veth-host up
        sudo ip -n warp_ns addr add 10.200.200.2/24 dev veth-warp
        sudo ip -n warp_ns link set veth-warp up && sudo ip -n warp_ns link set lo up
        sudo ip -n warp_ns route add default via 10.200.200.1
        
        # 3. 配置 NAT
        sudo sysctl -w net.ipv4.ip_forward=1 >/dev/null
        HOST_IF=$(ip route get 1.1.1.1 | awk '{print $5; exit}')
        sudo iptables -t nat -A POSTROUTING -o $HOST_IF -j MASQUERADE
        
        # 4. 在隔离空间启动服务 (使用环境变量强制跳过TOS)
        sudo ip netns exec warp_ns /usr/local/bin/warp-svc > /dev/null 2>&1 &
        sleep 3
        
        # 5. 注册与连接
        export WARP_CLI_ACCEPT_TOS=1
        sudo ip netns exec warp_ns /usr/local/bin/warp-cli registration new >/dev/null 2>&1 || true
        sudo ip netns exec warp_ns /usr/local/bin/warp-cli mode warp >/dev/null 2>&1
        sudo ip netns exec warp_ns /usr/local/bin/warp-cli connect >/dev/null 2>&1
        
        # 6. 生成便捷执行器
        echo '#!/bin/bash' | sudo tee /usr/local/bin/warp-exec >/dev/null
        echo 'sudo ip netns exec warp_ns "$@"' | sudo tee -a /usr/local/bin/warp-exec >/dev/null
        sudo chmod +x /usr/local/bin/warp-exec
        
        echo "✅ WARP Isolated Setup Success"
