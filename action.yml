name: Setup WARP (The Working Way)
description: "Minimalist WARP setup"

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        # 1. 禁用所有服务自启，防止 systemd 冲突
        echo -e '#!/bin/sh\nexit 101' | sudo tee /usr/sbin/policy-rc.d >/dev/null
        sudo chmod +x /usr/sbin/policy-rc.d
        
        # 2. 获取 WARP (通过官方 apt 源安装但不启动)
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(. /etc/os-release && echo $VERSION_CODENAME) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        
        sudo apt-get update -qq
        # 仅下载并安装包，拒绝任何触发器
        sudo apt-get install -y --no-install-recommends cloudflare-warp
        
        # 3. 立即清理掉它试图注册的 systemd 服务，确保宿主机干净
        sudo rm -f /usr/sbin/policy-rc.d
        sudo systemctl stop warp-svc || true
        sudo systemctl disable warp-svc || true
        
        # 4. 设置网络命名空间 (Netns)
        sudo ip netns add warp_ns
        sudo ip link add veth-host type veth peer name veth-warp
        sudo ip link set veth-warp netns warp_ns
        sudo ip addr add 10.200.200.1/24 dev veth-host && sudo ip link set veth-host up
        sudo ip -n warp_ns addr add 10.200.200.2/24 dev veth-warp
        sudo ip -n warp_ns link set veth-warp up && sudo ip -n warp_ns link set lo up
        sudo ip -n warp_ns route add default via 10.200.200.1
        
        # 5. 开启 NAT
        sudo sysctl -w net.ipv4.ip_forward=1 >/dev/null
        HOST_IF=$(ip route get 1.1.1.1 | awk '{print $5; exit}')
        sudo iptables -t nat -A POSTROUTING -o $HOST_IF -j MASQUERADE
        
        # 6. 启动服务并配置
        sudo ip netns exec warp_ns /usr/bin/warp-svc > /tmp/warp.log 2>&1 &
        sleep 5
        
        # 7. 注册与连接 (注入变量跳过TOS)
        export WARP_CLI_ACCEPT_TOS=1
        sudo ip netns exec warp_ns warp-cli registration new >/dev/null 2>&1 || true
        sudo ip netns exec warp_ns warp-cli mode warp >/dev/null 2>&1
        sudo ip netns exec warp_ns warp-cli connect >/dev/null 2>&1
        
        # 8. 生成工具
        echo '#!/bin/bash' | sudo tee /usr/local/bin/warp-exec >/dev/null
        echo 'sudo ip netns exec warp_ns "$@"' | sudo tee -a /usr/local/bin/warp-exec >/dev/null
        sudo chmod +x /usr/local/bin/warp-exec
        
        echo "✅ Setup Complete"
