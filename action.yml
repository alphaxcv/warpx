name: Setup WARP
description: Global WARP, GitHub bypass, warp-rotate

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1

        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq
        sudo apt-get install -y cloudflare-warp

        sudo systemctl enable --now warp-svc
        sleep 3

        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp
        for h in github.com api.github.com actions.githubusercontent.com githubassets.com pipelines.actions.githubusercontent.com; do
          sudo warp-cli --accept-tos tunnel host add "$h" || true
        done
        sudo warp-cli --accept-tos connect

        printf '%s\n' \
          '#!/bin/bash' \
          'set -e' \
          'sudo warp-cli --accept-tos disconnect' \
          'sleep 1' \
          'sudo warp-cli --accept-tos registration delete || true' \
          'sudo warp-cli --accept-tos registration new' \
          'sudo warp-cli --accept-tos connect' \
          'sleep 3' \
          'curl -s https://api.ipify.org' \
          | sudo tee /usr/local/bin/warp-rotate >/dev/null
        sudo chmod +x /usr/local/bin/warp-rotate
