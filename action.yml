name: Setup WARP
description: Official cloudflare-warp client, global mode (warp-cli mode warp) + split-tunnel exclude GitHub's api/web/git/hooks IP ranges (auto-fetched from api.github.com/meta) so Actions logging/heartbeat stays direct, with identity rotation on each call
inputs:
  stack:
    description: "currently informational only; warp-cli does not expose a v4/v6-only mode switch the way wgcf did"
    required: false
    default: dual
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1

        # ---- 安装官方 cloudflare-warp 客户端 ----
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends curl gnupg lsb-release jq

        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

        ARCH="$(dpkg --print-architecture)"
        CODENAME="$(lsb_release -cs)"
        echo "deb [arch=${ARCH} signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ ${CODENAME} main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cloudflare-warp

        # GitHub Actions runner 里没有用户级 systemd session，手动起 daemon
        sudo nohup warp-svc >/tmp/warp-svc.log 2>&1 &
        sleep 3

        sudo tee /usr/local/bin/warp-fetch-github-cidrs >/dev/null <<'F'
        #!/bin/bash
        set -e
        OUT="${1:-/var/lib/cloudflare-warp/github-cidrs.txt}"
        sudo mkdir -p "$(dirname "$OUT")"
        META=$(curl -fsSL https://api.github.com/meta)
        # 只取 IPv4 段（add-excluded-route 对 IPv6 CIDR 处理不一致，且 GHA 多数走 v4 出网）
        echo "$META" | jq -r '
          (.api // []), (.web // []), (.git // []), (.hooks // [])
          | .[]
        ' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$' | sort -u > "$OUT"
        echo "[warp-fetch-github-cidrs] fetched $(wc -l < "$OUT") CIDR ranges -> $OUT" >&2
        F
        sudo chmod +x /usr/local/bin/warp-fetch-github-cidrs

        sudo tee /usr/local/bin/warp-rotate >/dev/null <<R
        #!/bin/bash
        set -e
        GH_CIDRS=/var/lib/cloudflare-warp/github-cidrs.txt

        warp-cli --accept-tos disconnect >/dev/null 2>&1 || true
        warp-cli --accept-tos registration delete >/dev/null 2>&1 || true

        warp-cli --accept-tos registration new >/dev/null 2>&1

        warp-cli --accept-tos mode warp >/dev/null 2>&1

        if [ -f "\$GH_CIDRS" ]; then
          while read -r cidr; do
            [ -z "\$cidr" ] && continue
            warp-cli --accept-tos add-excluded-route "\$cidr" >/dev/null 2>&1 || \
              echo "[warp-rotate] warn: failed to exclude \$cidr (add-excluded-route may be unsupported on this client version)" >&2
          done < "\$GH_CIDRS"
        else
          echo "[warp-rotate] warn: \$GH_CIDRS not found, GitHub traffic will NOT be excluded" >&2
        fi

        warp-cli --accept-tos connect >/dev/null 2>&1

        for _ in \$(seq 1 10); do
          curl -s --connect-timeout 3 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE '^warp=(on|plus)\$' && exit 0
          sleep 1
        done
        exit 1
        R
        sudo chmod +x /usr/local/bin/warp-rotate

        sudo warp-fetch-github-cidrs

        ok=0
        for i in $(seq 1 5); do
          sudo warp-rotate && ok=1 && break
          sleep $((RANDOM % 8 + i * 2))
        done
        [ "$ok" -eq 1 ] || { echo "WARP failed"; cat /tmp/warp-svc.log; exit 1; }

        echo "WARP is up (global mode via warp-cli)."
        echo "GitHub IP ranges excluded from tunnel -- Actions logging stays on the direct route."
        echo "Exit IP (via WARP): $(curl -s --connect-timeout 5 https://api.ipify.org || echo N/A)"
