name: Setup WARP (Netns Isolated)
description: warp-cli mode warp + netns isolation + warp-rotate

inputs:
  stack:
    description: "ipv4, ipv6, or dual"
    required: false
    default: dual

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1
        STACK="${{ inputs.stack }}"
        NS="warp_ns"

        echo "::group::1. Install Dependencies & WARP"
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends curl gpg iproute2 iptables
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(. /etc/os-release && echo $VERSION_CODENAME) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cloudflare-warp
        
        # 停用宿主机默认启动的 warp-svc，避免与 netns 内的进程冲突
        sudo systemctl stop warp-svc || true
        sudo systemctl disable warp-svc || true
        echo "::endgroup::"

        echo "::group::2. Setup Network Namespace ($NS)"
        # 创建命名空间
        sudo ip netns add $NS
        
        # 创建 veth 接口对，打通宿主机与 netns
        sudo ip link add veth-host type veth peer name veth-warp
        sudo ip link set veth-warp netns $NS
        
        # 配置宿主机端 IP (10.200.200.1)
        sudo ip addr add 10.200.200.1/24 dev veth-host
        sudo ip link set veth-host up
        
        # 配置 Netns 端 IP (10.200.200.2) 及默认路由
        sudo ip -n $NS addr add 10.200.200.2/24 dev veth-warp
        sudo ip -n $NS link set veth-warp up
        sudo ip -n $NS link set lo up
        sudo ip -n $NS route add default via 10.200.200.1
        
        # 在宿主机开启 NAT 转发，让 netns 可以访问外网以连接 Cloudflare 节点
        sudo sysctl -w net.ipv4.ip_forward=1 >/dev/null
        HOST_IF=$(ip route get 1.1.1.1 | grep -oP 'dev \K\S+')
        sudo iptables -t nat -A POSTROUTING -o $HOST_IF -j MASQUERADE
        
        # 为 netns 配置独立 DNS
        sudo mkdir -p /etc/netns/$NS
        echo "nameserver 1.1.1.1" | sudo tee /etc/netns/$NS/resolv.conf >/dev/null
        echo "::endgroup::"

        echo "::group::3. Initialize WARP inside Netns"
        # 在 netns 内后台启动 warp 守护进程
        sudo ip netns exec $NS warp-svc > /tmp/warp-svc.log 2>&1 &
        sleep 3 # 等待守护进程初始化
        
        # 定义快捷变量，所有 warp-cli 操作都在 netns 内执行
        W="sudo ip netns exec $NS warp-cli --accept-tos"

        connect() {
          $W registration new >/dev/null 2>&1 || true
          $W mode warp >/dev/null 2>&1
          case "$STACK" in
            ipv4) $W tunnel ip add-range ::0/0 >/dev/null 2>&1 || true ;;
            ipv6) $W tunnel ip add-range 0.0.0.0/0 >/dev/null 2>&1 || true ;;
          esac
          $W connect >/dev/null 2>&1
          for _ in $(seq 1 30); do
            $W status 2>/dev/null | grep -q Connected && return 0
            sleep 1
          done
          return 1
        }

        for i in $(seq 1 5); do
          $W disconnect >/dev/null 2>&1 || true
          $W registration delete >/dev/null 2>&1 || true
          connect && break
          [ "$i" -eq 5 ] && { echo "WARP connect failed"; exit 1; }
          sleep $((i * 2))
        done
        echo "::endgroup::"

        echo "::group::4. IP Verification"
        echo "Host IPv4 (Bypass): $(curl -4s --connect-timeout 5 https://api.ipify.org || echo N/A)"
        echo "WARP IPv4 (Netns): $(sudo ip netns exec $NS curl -4s --connect-timeout 5 https://api.ipify.org || echo N/A)"
        echo "WARP IPv6 (Netns): $(sudo ip netns exec $NS curl -6s --connect-timeout 5 https://api64.ipify.org || echo N/A)"
        echo "::endgroup::"

        echo "::group::5. Generate Helper Scripts"
        # 1. IP 刷新脚本 (warp-rotate)
        sudo tee /usr/local/bin/warp-rotate >/dev/null <<EOF
        #!/bin/bash
        W="sudo ip netns exec $NS warp-cli --accept-tos"
        STACK="$STACK"
        \$W disconnect >/dev/null 2>&1 || true
        \$W registration delete >/dev/null 2>&1 || true
        \$W registration new >/dev/null 2>&1 || exit 1
        \$W mode warp >/dev/null 2>&1 || exit 1
        case "\$STACK" in
          ipv4) \$W tunnel ip add-range ::0/0 >/dev/null 2>&1 || true ;;
          ipv6) \$W tunnel ip add-range 0.0.0.0/0 >/dev/null 2>&1 || true ;;
        esac
        \$W connect >/dev/null 2>&1 || exit 1
        for _ in \$(seq 1 30); do
          \$W status 2>/dev/null | grep -q Connected && exit 0
          sleep 1
        done
        exit 1
        EOF
        sudo sed -i 's/^[ ]\+//g' /usr/local/bin/warp-rotate
        sudo chmod +x /usr/local/bin/warp-rotate

        # 2. 隔离执行脚本 (warp-exec)
        sudo tee /usr/local/bin/warp-exec >/dev/null <<EOF
        #!/bin/bash
        exec sudo ip netns exec $NS "\$@"
        EOF
        sudo chmod +x /usr/local/bin/warp-exec
        echo "Scripts installed: warp-rotate, warp-exec"
        echo "::endgroup::"
