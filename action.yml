name: Setup WARP
description: Global WARP (WireGuard) + ip rule from LAN + warp-rotate

inputs:
  stack:
    description: "WARP stack: ipv4, ipv6, or dual"
    required: false
    default: dual

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends wireguard-tools iproute2 curl

        LAN=$(ip route get 192.168.193.10 | grep -oP 'src \K\S+')
        CONFIG="[Interface]
        PrivateKey = cKE7LmCF61IhqqABGhvJ44jWXp8fKymcMAEVAzbDF2k=
        Address = 172.16.0.2/32
        Address = fd01:5ca1:ab1e:823e:e094:eb1c:ff87:1fab/128
        PostUp = ip -4 rule add from $LAN lookup main
        PostDown = ip -4 rule delete from $LAN lookup main
        DNS = 1.1.1.1,8.8.8.8,8.8.4.4,2606:4700:4700::1111,2001:4860:4860::8888,2001:4860:4860::8844
        MTU = 1280

        [Peer]
        PublicKey = bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
        "
        case "${{ inputs.stack }}" in
          ipv4) CONFIG+="AllowedIPs = 0.0.0.0/0
        " ;;
          ipv6) CONFIG+="AllowedIPs = ::/0
        " ;;
          *)    CONFIG+="AllowedIPs = 0.0.0.0/0
        AllowedIPs = ::/0
        " ;;
        esac
        CONFIG+="Endpoint = engage.cloudflareclient.com:2408"
        echo "$CONFIG" | sed 's/^[ ]\+//g' | sudo tee /etc/wireguard/warp.conf >/dev/null

        for attempt in $(seq 1 8); do
          sudo wg-quick down warp 2>/dev/null || true
          sudo wg-quick up warp && break
          sleep $((attempt * 2))
        done
        sudo wg show warp latest-handshakes | grep -qE '[1-9][0-9]*' || { echo "WARP connect failed"; exit 1; }

        sleep 1
        echo "IPv4: $(curl -4sm8 --retry 3 -A Mozilla https://api-ipv4.ip.sb/geoip 2>/dev/null || curl -4sm8 --retry 3 https://speed.cloudflare.com/meta 2>/dev/null || echo N/A)"
        echo "IPv6: $(curl -6sm8 --retry 3 -A Mozilla https://api-ipv6.ip.sb/geoip 2>/dev/null || curl -6sm8 --retry 3 https://speed.cloudflare.com/meta 2>/dev/null || echo N/A)"

        printf '%s\n' '#!/bin/bash' 'set -e' \
          'wg-quick down warp 2>/dev/null || true' 'sleep 2' 'wg-quick up warp' 'sleep 3' \
          | sudo tee /usr/local/bin/warp-rotate >/dev/null
        sudo chmod +x /usr/local/bin/warp-rotate
