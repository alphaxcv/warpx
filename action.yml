name: Setup WARP
description: Install Cloudflare warp-cli, connect in full-tunnel (global proxy) mode with real-time journal logs streamed to the job log, preserve the runner's own LAN route outside the tunnel, and provide a reusable warp-rotate command that gets a fresh IP and confirms the change. Single self-contained file -- no external script files needed, safe to vendor into any repo or reference via uses:.

runs:
  using: composite
  steps:
    - name: Install warp-cli
      shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends curl gpg iproute2
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(. /etc/os-release && echo "$VERSION_CODENAME") main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cloudflare-warp

    - name: Start warp-svc
      shell: bash
      run: |
        set -e
        sudo systemctl enable --now warp-svc
        for _ in $(seq 1 30); do
          sudo warp-cli --accept-tos status >/dev/null 2>&1 && break
          sleep 1
        done

    - name: Preserve LAN route outside the tunnel
      shell: bash
      run: |
        set -e
        LAN=$(ip route get 192.168.193.10 | grep -oP 'src \K\S+')
        echo "Runner LAN address: $LAN"
        sudo ip -4 rule add from "$LAN" lookup main 2>/dev/null || true

    - name: Install helper commands (decoded from base64, no external files)
      shell: bash
      run: |
        set -e
        echo  | base64 -d | sudo tee /usr/local/bin/warp-live >/dev/null
        echo  | base64 -d | sudo tee /usr/local/bin/warp-rotate >/dev/null
        sudo chmod +x /usr/local/bin/warp-live /usr/local/bin/warp-rotate

    - name: Connect WARP (with retries)
      shell: bash
      run: |
        set -e
        ok=0
        for i in $(seq 1 5); do
          warp-rotate && ok=1 && break
          sleep $((i * 2))
        done
        if [ "$ok" -ne 1 ]; then
          echo "WARP connect failed"
          exit 1
        fi

    - name: Show resulting IP
      shell: bash
      run: |
        set -e
        echo "IPv4: $(curl -4s --connect-timeout 5 https://api.ipify.org || echo N/A)"
        echo "IPv6: $(curl -6s --connect-timeout 5 https://api64.ipify.org || echo N/A)"
