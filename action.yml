name: Setup WARP
description: Cloudflare WARP global mode with GitHub bypass (v4/v6) and optional IP rotation.

inputs:
  rotate-times:
    description: "IP rotate count after initial connect (0 = no rotate)"
    required: false
    default: "0"

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends curl gnupg lsb-release jq iproute2 dnsutils

        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cloudflare-warp

        sudo nohup warp-svc >/tmp/warp-svc.log 2>&1 &
        sleep 3

        # fetch GitHub bypass cidrs (v4+v6)
        sudo mkdir -p /var/lib/cloudflare-warp
        timeout 20s curl -fsSL https://api.github.com/meta \
          | jq -r '(.api // []), (.web // []), (.git // []), (.hooks // []) | .[]' \
          | sort -u \
          | sudo tee /var/lib/cloudflare-warp/github-cidrs.txt >/dev/null

        # apply bypass rules (v4+v6)
        PREF=100
        while ip -4 rule show | grep -q "pref ${PREF} "; do
          R=$(ip -4 rule show | grep "pref ${PREF} " | head -n1 | sed -E 's/^([0-9]+):.*/\1/')
          sudo ip -4 rule del pref "$R" 2>/dev/null || break
        done
        while ip -6 rule show | grep -q "pref ${PREF} "; do
          R=$(ip -6 rule show | grep "pref ${PREF} " | head -n1 | sed -E 's/^([0-9]+):.*/\1/')
          sudo ip -6 rule del pref "$R" 2>/dev/null || break
        done

        while read -r cidr; do
          [ -z "$cidr" ] && continue
          if [[ "$cidr" == *:* ]]; then
            sudo ip -6 rule add to "$cidr" table main pref "$PREF" 2>/dev/null || true
          else
            sudo ip -4 rule add to "$cidr" table main pref "$PREF" 2>/dev/null || true
          fi
        done < /var/lib/cloudflare-warp/github-cidrs.txt

        # initial connect: create registration only if missing
        if ! timeout 8s warp-cli --accept-tos registration show >/dev/null 2>&1; then
          timeout 45s warp-cli --accept-tos registration new >/dev/null 2>&1
        fi
        timeout 20s warp-cli --accept-tos mode warp >/dev/null 2>&1 || true
        timeout 45s warp-cli --accept-tos connect >/dev/null 2>&1

        # verify warp on
        timeout 10s bash -c 'for i in $(seq 1 10); do curl -s https://cloudflare.com/cdn-cgi/trace | grep -qE "^warp=(on|plus)$" && exit 0; sleep 1; done; exit 1'

        # optional rotation
        ROTATE_TIMES="${{ inputs.rotate-times }}"
        [[ "$ROTATE_TIMES" =~ ^[0-9]+$ ]] || ROTATE_TIMES=0

        for _ in $(seq 1 "$ROTATE_TIMES"); do
          timeout 20s warp-cli --accept-tos disconnect >/dev/null 2>&1 || true
          timeout 20s warp-cli --accept-tos registration delete >/dev/null 2>&1 || true
          timeout 45s warp-cli --accept-tos registration new >/dev/null 2>&1
          timeout 20s warp-cli --accept-tos mode warp >/dev/null 2>&1
          timeout 45s warp-cli --accept-tos connect >/dev/null 2>&1
          timeout 10s bash -c 'for i in $(seq 1 10); do curl -s https://cloudflare.com/cdn-cgi/trace | grep -qE "^warp=(on|plus)$" && exit 0; sleep 1; done; exit 1'
        done

        echo "WARP ready. GitHub bypass rules applied."
