name: Setup WARP (Netns Isolated)
description: "High-performance isolated WARP runner"

inputs:
  stack:
    description: "ipv4, ipv6, or dual"
    required: false
    default: dual

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        # 1. 安全安装 WARP (防止服务自动启动劫持 DNS)
        echo -e '#!/bin/sh\nexit 101' | sudo tee /usr/sbin/policy-rc.d >/dev/null
        sudo chmod +x /usr/sbin/policy-rc.d
        
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(. /etc/os-release && echo $VERSION_CODENAME) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo rm -f /usr/sbin/policy-rc.d

        # 2. 创建隔离网络空间 (Netns)
        sudo ip netns add warp_ns
        sudo ip link add veth-host type veth peer name veth-warp
        sudo ip link set veth-warp netns warp_ns
        sudo ip addr add 10.200.200.1/24 dev veth-host && sudo ip link set veth-host up
        sudo ip -n warp_ns addr add 10.200.200.2/24 dev veth-warp
        sudo ip -n warp_ns link set veth-warp up && sudo ip -n warp_ns link set lo up
        sudo ip -n warp_ns route add default via 10.200.200.1
        
        # 3. 开启 NAT 转发
        sudo sysctl -w net.ipv4.ip_forward=1 >/dev/null
        HOST_IF=$(ip route get 1.1.1.1 | awk '{print $5; exit}')
        sudo iptables -t nat -A POSTROUTING -o $HOST_IF -j MASQUERADE
        sudo iptables -I FORWARD -i veth-host -j ACCEPT
        sudo iptables -I FORWARD -o veth-host -j ACCEPT
        sudo mkdir -p /etc/netns/warp_ns && echo "nameserver 1.1.1.1" | sudo tee /etc/netns/warp_ns/resolv.conf >/dev/null

        # 4. 在隔离环境中启动 WARP
        sudo ip netns exec warp_ns warp-svc > /dev/null 2>&1 &
        sleep 4
        
        # 5. 连接与配置
        W="sudo ip netns exec warp_ns warp-cli --accept-tos"
        $W registration new >/dev/null 2>&1 || true
        $W mode warp >/dev/null 2>&1
        [[ "${{ inputs.stack }}" == "ipv4" ]] && $W tunnel ip add-range ::0/0 >/dev/null 2>&1 || true
        [[ "${{ inputs.stack }}" == "ipv6" ]] && $W tunnel ip add-range 0.0.0.0/0 >/dev/null 2>&1 || true
        $W connect >/dev/null 2>&1
        
        # 6. 生成便捷执行器
        echo '#!/bin/bash' | sudo tee /usr/local/bin/warp-exec >/dev/null
        echo 'sudo ip netns exec warp_ns "$@"' | sudo tee -a /usr/local/bin/warp-exec >/dev/null
        sudo chmod +x /usr/local/bin/warp-exec

        # 7. 自动生成旋转器
        echo '#!/bin/bash' | sudo tee /usr/local/bin/warp-rotate >/dev/null
        echo 'W="sudo ip netns exec warp_ns warp-cli --accept-tos"' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        echo '$W disconnect >/dev/null 2>&1; $W registration delete >/dev/null 2>&1; $W registration new >/dev/null 2>&1; $W connect >/dev/null 2>&1' | sudo tee -a /usr/local/bin/warp-rotate >/dev/null
        sudo chmod +x /usr/local/bin/warp-rotate
