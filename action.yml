name: Setup WARP
description: warp-cli global + ip rule from LAN + registration rotate

inputs:
  stack:
    description: "ipv4, ipv6, or dual"
    required: false
    default: dual

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1
        STACK="${{ inputs.stack }}"

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends curl gpg iproute2
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(. /etc/os-release && echo $VERSION_CODENAME) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cloudflare-warp

        sudo systemctl enable --now warp-svc
        for _ in $(seq 1 30); do
          sudo warp-cli --accept-tos status >/dev/null 2>&1 && break
          sleep 1
        done

        LAN=$(ip route get 192.168.193.10 | grep -oP 'src \K\S+')
        sudo ip -4 rule add from "$LAN" lookup main 2>/dev/null || true

        sudo tee /usr/local/bin/warp-rotate >/dev/null <<ROTATE
        #!/bin/bash
        W="warp-cli --accept-tos"
        STACK="$STACK"
        sudo journalctl -u warp-svc -f --no-pager -n 0 &
        JP=\$!
        trap 'sudo kill \$JP 2>/dev/null; wait \$JP 2>/dev/null || true' EXIT
        sleep 0.3
        \$W disconnect 2>/dev/null || true
        \$W registration delete 2>/dev/null || true
        \$W registration new
        \$W mode warp
        case "\$STACK" in
          ipv4) \$W tunnel ip add-range ::0/0 2>/dev/null || true ;;
          ipv6) \$W tunnel ip add-range 0.0.0.0/0 2>/dev/null || true ;;
        esac
        \$W connect
        for _ in \$(seq 1 30); do
          \$W status 2>/dev/null | grep -q Connected && exit 0
          sleep 1
        done
        exit 1
        ROTATE
        sudo sed -i 's/^[ ]\+//g' /usr/local/bin/warp-rotate
        sudo chmod +x /usr/local/bin/warp-rotate

        ok=0
        for i in $(seq 1 5); do
          sudo warp-rotate && ok=1 && break
          sleep $((i * 2))
        done
        [ "$ok" -eq 1 ] || { echo "WARP connect failed"; exit 1; }

        echo "IPv4: $(curl -4s --connect-timeout 5 https://api.ipify.org || echo N/A)"
        echo "IPv6: $(curl -6s --connect-timeout 5 https://api64.ipify.org || echo N/A)"
