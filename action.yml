name: Setup WARP
description: WireGuard global mode (0.0.0.0/0 via WARP) + LAN bypass rule keeps GitHub Actions logging alive + identity rotation on each call
inputs:
  stack:
    description: "ipv4, ipv6, or dual"
    required: false
    default: dual
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1
        STACK="${{ inputs.stack }}"
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends wireguard-tools iproute2 curl
        curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 \
          | sudo tee /usr/local/bin/wgcf >/dev/null
        sudo chmod +x /usr/local/bin/wgcf
        sudo mkdir -p /var/lib/wgcf

        # ---- 生成全局模式 wg 配置 ----
        # 关键点：AllowedIPs = 0.0.0.0/0（和/或 ::/0）让 WARP 接管全部出站流量，
        # 但通过 PostUp/PostDown 加一条 ip rule，让"从 runner 自身 LAN 出口 IP 发出"
        # 的流量（GitHub Actions 自己的心跳/日志上报走的就是这个源地址）继续走 main
        # 路由表（即原始网卡），不经过 WARP。这样业务流量全局走 WARP，
        # 但 Actions 跟 GitHub 服务器的日志通道不受影响、不会卡死。
        sudo tee /usr/local/bin/warp-wg-build >/dev/null <<'B'
        #!/bin/bash
        STACK="${1:-dual}"
        LAN=$(ip route get 192.168.193.10 | grep -oP 'src \K\S+')
        LAN6=$(ip -6 route get 2606:4700:4700::1111 2>/dev/null | grep -oP 'src \K\S+' || true)

        cd /var/lib/wgcf && wgcf generate >/dev/null 2>&1
        cp wgcf-profile.conf /etc/wireguard/warp.conf
        sed -i '/^DNS/d;/PostUp/d;/PostDown/d' /etc/wireguard/warp.conf
        sed -i "/\[Interface\]/a DNS = off" /etc/wireguard/warp.conf
        grep -q '^MTU' /etc/wireguard/warp.conf || sed -i "/\[Interface\]/a MTU = 1280" /etc/wireguard/warp.conf

        # 默认双栈走 0.0.0.0/0 + ::/0（全局），ipv4/ipv6 单栈时只接管对应族
        if [ "$STACK" = "ipv4" ]; then
          sed -i '/^AllowedIPs/d' /etc/wireguard/warp.conf
          echo "AllowedIPs = 0.0.0.0/0" >> /etc/wireguard/warp.conf
        elif [ "$STACK" = "ipv6" ]; then
          sed -i '/^AllowedIPs/d' /etc/wireguard/warp.conf
          echo "AllowedIPs = ::/0" >> /etc/wireguard/warp.conf
        fi
        # dual 模式直接用 wgcf generate 自带的 0.0.0.0/0 + ::/0，不用动

        sed -i "/\[Interface\]/a PostDown = ip -4 rule delete from ${LAN} lookup main" /etc/wireguard/warp.conf
        sed -i "/\[Interface\]/a PostUp = ip -4 rule add from ${LAN} lookup main pref 100" /etc/wireguard/warp.conf
        if [ -n "$LAN6" ]; then
          sed -i "/\[Interface\]/a PostDown = ip -6 rule delete from ${LAN6} lookup main" /etc/wireguard/warp.conf
          sed -i "/\[Interface\]/a PostUp = ip -6 rule add from ${LAN6} lookup main pref 100" /etc/wireguard/warp.conf
        fi
        B
        sudo chmod +x /usr/local/bin/warp-wg-build

        sudo tee /usr/local/bin/warp-rotate >/dev/null <<R
        #!/bin/bash
        STACK="$STACK"
        D=/var/lib/wgcf
        [ -f /etc/wireguard/warp.conf ] && cp /etc/wireguard/warp.conf "\$D/last.conf"
        wg-quick down warp >/dev/null 2>&1 || true

        # 清理设备身份，确保每次是"全新设备"重新注册
        rm -f "\$D/wgcf-account.toml" "\$D/wgcf-identity.json" "\$D"/wgcf-profile.conf

        cd "\$D" && wgcf register --accept-tos >/dev/null 2>&1 || { [ -f "\$D/last.conf" ] && cp "\$D/last.conf" /etc/wireguard/warp.conf && wg-quick up warp >/dev/null 2>&1; exit 1; }
        warp-wg-build "\$STACK" || { [ -f "\$D/last.conf" ] && cp "\$D/last.conf" /etc/wireguard/warp.conf && wg-quick up warp >/dev/null 2>&1; exit 1; }
        wg-quick up warp >/dev/null 2>&1 || { [ -f "\$D/last.conf" ] && cp "\$D/last.conf" /etc/wireguard/warp.conf && wg-quick up warp >/dev/null 2>&1; exit 1; }

        # 全局模式下 curl 默认走 WARP（因为 0.0.0.0/0 已接管），
        # 用它验证隧道本身是否真的握手成功并出网
        for _ in \$(seq 1 8); do
          curl -4sf --connect-timeout 3 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE '^warp=(on|plus)\$' && exit 0
          sleep 1
        done
        [ -f "\$D/last.conf" ] && cp "\$D/last.conf" /etc/wireguard/warp.conf && wg-quick up warp >/dev/null 2>&1
        exit 1
        R
        sudo chmod +x /usr/local/bin/warp-rotate

        ok=0
        for i in $(seq 1 5); do
          sudo warp-rotate "$STACK" && ok=1 && break
          sleep $((RANDOM % 8 + i * 2))
        done
        [ "$ok" -eq 1 ] || { echo "WARP failed"; exit 1; }

        echo "WARP is up (global mode). GitHub Actions logging still goes via LAN bypass rule."
        echo "IPv4 (via WARP): $(curl -4s --connect-timeout 5 https://api.ipify.org || echo N/A)"
        echo "IPv6 (via WARP): $(curl -6s --connect-timeout 5 https://api64.ipify.org || echo N/A)"
        echo
        echo "提示：全局模式下，Selenium/SeleniumBase 不需要再单独配置 --proxy-server，"
        echo "Chrome 默认网络流量会自动走 WARP 隧道出网。"
