name: Setup WARP
description: Setup Cloudflare WARP in global mode, keep GitHub Actions logs/control-plane and apt endpoints on direct route, and support optional IP rotation.

inputs:
  stack:
    description: "informational only; warp-cli has no v4/v6-only switch"
    required: false
    default: dual
  rotate-times:
    description: "How many times to rotate IP after initial connect. 0 means no rotation."
    required: false
    default: "0"

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1

        # base deps
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          curl gnupg lsb-release jq iproute2 dnsutils coreutils

        # install cloudflare-warp
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

        ARCH="$(dpkg --print-architecture)"
        CODENAME="$(lsb_release -cs)"
        echo "deb [arch=${ARCH} signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ ${CODENAME} main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cloudflare-warp

        # start daemon
        sudo nohup warp-svc >/tmp/warp-svc.log 2>&1 &
        sleep 3

        sudo tee /usr/local/bin/warp-current-ip >/dev/null <<'EOF'
        #!/bin/bash
        set -euo pipefail
        timeout 8s curl -fsS https://api.ipify.org || true
        EOF
        sudo chmod +x /usr/local/bin/warp-current-ip

        sudo tee /usr/local/bin/warp-fetch-bypass-cidrs >/dev/null <<'EOF'
        #!/bin/bash
        set -euo pipefail

        OUT="${1:-/var/lib/cloudflare-warp/bypass-cidrs.txt}"
        TMP="$(mktemp)"
        sudo mkdir -p "$(dirname "$OUT")"

        # 1) GitHub official ranges for api/web/git/hooks
        META="$(timeout 20s curl -fsSL https://api.github.com/meta || true)"
        if [ -n "$META" ]; then
          echo "$META" | jq -r '
            (.api // []), (.web // []), (.git // []), (.hooks // [])
            | .[]
          ' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$' >> "$TMP" || true
        fi

        # 2) apt/azure common endpoints -> /32 direct route
        for h in archive.ubuntu.com security.ubuntu.com azure.archive.ubuntu.com packages.microsoft.com; do
          timeout 8s dig +short A "$h" \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's/$/\/32/' >> "$TMP" || true
        done

        sort -u "$TMP" | sudo tee "$OUT" >/dev/null
        rm -f "$TMP"

        echo "[warp-fetch-bypass-cidrs] fetched $(wc -l < "$OUT") CIDR ranges -> $OUT" >&2
        EOF
        sudo chmod +x /usr/local/bin/warp-fetch-bypass-cidrs

        sudo tee /usr/local/bin/warp-apply-bypass >/dev/null <<'EOF'
        #!/bin/bash
        set -euo pipefail
        CIDRS=/var/lib/cloudflare-warp/bypass-cidrs.txt
        PREF=100

        # remove old pref=100 rules
        while ip rule show | grep -q "pref ${PREF} "; do
          R=$(ip rule show | grep "pref ${PREF} " | head -n1 | sed -E 's/^([0-9]+):.*/\1/')
          ip rule delete pref "$R" 2>/dev/null || break
        done

        [ -f "$CIDRS" ] || { echo "[warp-apply-bypass] warn: $CIDRS missing, skip" >&2; exit 0; }

        while read -r cidr; do
          [ -z "$cidr" ] && continue
          ip rule add to "$cidr" table main pref "$PREF" 2>/dev/null || true
        done < "$CIDRS"

        echo "[warp-apply-bypass] applied $(wc -l < "$CIDRS") rules" >&2
        EOF
        sudo chmod +x /usr/local/bin/warp-apply-bypass

        sudo tee /usr/local/bin/warp-connect >/dev/null <<'EOF'
        #!/bin/bash
        set -euo pipefail

        # initial connect path: create registration only if missing
        if ! timeout 8s warp-cli --accept-tos registration show >/dev/null 2>&1; then
          echo "[warp-connect] no registration, creating..." >&2
          timeout 45s warp-cli --accept-tos registration new >/dev/null 2>&1
        fi

        timeout 20s warp-cli --accept-tos mode warp >/dev/null 2>&1 || true
        timeout 40s warp-cli --accept-tos connect >/dev/null 2>&1

        for _ in $(seq 1 20); do
          if timeout 5s curl -s https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE '^warp=(on|plus)$'; then
            exit 0
          fi
          sleep 1
        done

        echo "[warp-connect] warp trace check failed" >&2
        exit 1
        EOF
        sudo chmod +x /usr/local/bin/warp-connect

        sudo tee /usr/local/bin/warp-rotate >/dev/null <<'EOF'
        #!/bin/bash
        set -euo pipefail

        BEFORE_IP="$(warp-current-ip || true)"
        [ -n "$BEFORE_IP" ] || BEFORE_IP="N/A"
        echo "[warp-rotate] before ip: $BEFORE_IP" >&2

        # rotate path only: re-register to force identity/IP change
        timeout 20s warp-cli --accept-tos disconnect >/dev/null 2>&1 || true
        timeout 20s warp-cli --accept-tos registration delete >/dev/null 2>&1 || true
        timeout 45s warp-cli --accept-tos registration new >/dev/null 2>&1
        timeout 20s warp-cli --accept-tos mode warp >/dev/null 2>&1
        timeout 45s warp-cli --accept-tos connect >/dev/null 2>&1

        for _ in $(seq 1 20); do
          if timeout 5s curl -s https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE '^warp=(on|plus)$'; then
            break
          fi
          sleep 1
        done

        timeout 5s curl -s https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE '^warp=(on|plus)$'

        AFTER_IP="$(warp-current-ip || true)"
        [ -n "$AFTER_IP" ] || AFTER_IP="N/A"
        echo "[warp-rotate] after  ip: $AFTER_IP" >&2

        if [ "$BEFORE_IP" = "$AFTER_IP" ] && [ "$AFTER_IP" != "N/A" ]; then
          echo "[warp-rotate] warn: egress IP unchanged this cycle" >&2
        fi
        EOF
        sudo chmod +x /usr/local/bin/warp-rotate

        # prepare bypass rules first
        sudo warp-fetch-bypass-cidrs
        sudo warp-apply-bypass

        # initial connect (NO registration delete here)
        if ! sudo warp-connect; then
          echo "[setup-warp] initial connect failed, restarting warp-svc once..." >&2
          sudo pkill -f warp-svc >/dev/null 2>&1 || true
          sudo nohup warp-svc >/tmp/warp-svc.log 2>&1 &
          sleep 3
          sudo warp-connect || { echo "WARP failed"; cat /tmp/warp-svc.log; exit 1; }
        fi

        # optional rotation cycles
        ROTATE_TIMES="${{ inputs.rotate-times }}"
        if ! [[ "$ROTATE_TIMES" =~ ^[0-9]+$ ]]; then
          echo "[setup-warp] invalid rotate-times='$ROTATE_TIMES', fallback to 0" >&2
          ROTATE_TIMES=0
        fi

        if [ "$ROTATE_TIMES" -gt 0 ]; then
          for n in $(seq 1 "$ROTATE_TIMES"); do
            echo "[setup-warp] rotate cycle $n/$ROTATE_TIMES" >&2
            sudo warp-rotate || { echo "[setup-warp] rotate failed"; cat /tmp/warp-svc.log; exit 1; }
            sudo warp-apply-bypass
          done
        fi

        echo "WARP is up (global mode via warp-cli)."
        echo "Bypass rules applied for GitHub + apt endpoints."
        echo "Exit IP: $(sudo warp-current-ip || echo N/A)"
