name: Setup WARP
description: WireGuard global + ip rule from LAN + wgcf rotate(until IP changes, max 3)

inputs:
  stack:
    description: "ipv4, ipv6, or dual"
    required: false
    default: dual

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1
        STACK="${{ inputs.stack }}"

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends wireguard-tools iproute2 curl
        curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 \
          | sudo tee /usr/local/bin/wgcf >/dev/null
        sudo chmod +x /usr/local/bin/wgcf
        sudo mkdir -p /var/lib/wgcf

        sudo tee /usr/local/bin/warp-wg-build >/dev/null <<'B'
        #!/bin/bash
        set -e
        STACK="${1:-dual}"
        LAN=$(ip route get 192.168.193.10 | grep -oP 'src \K\S+')
        cd /var/lib/wgcf && wgcf generate >/dev/null 2>&1
        cp wgcf-profile.conf /etc/wireguard/warp.conf
        sed -i '/^DNS/d;/PostUp/d;/PostDown/d' /etc/wireguard/warp.conf
        sed -i "/\[Interface\]/a DNS = off" /etc/wireguard/warp.conf
        sed -i "/\[Interface\]/a PostDown = ip -4 rule delete from ${LAN} lookup main" /etc/wireguard/warp.conf
        sed -i "/\[Interface\]/a PostUp = ip -4 rule add from ${LAN} lookup main" /etc/wireguard/warp.conf
        grep -q '^MTU' /etc/wireguard/warp.conf || sed -i "/\[Interface\]/a MTU = 1280" /etc/wireguard/warp.conf
        if [ "$STACK" = "ipv4" ]; then
          sed -i '/^AllowedIPs/d' /etc/wireguard/warp.conf && echo "AllowedIPs = 0.0.0.0/0" >> /etc/wireguard/warp.conf
        elif [ "$STACK" = "ipv6" ]; then
          sed -i '/^AllowedIPs/d' /etc/wireguard/warp.conf && echo "AllowedIPs = ::/0" >> /etc/wireguard/warp.conf
        fi
        B
        sudo chmod +x /usr/local/bin/warp-wg-build

        sudo tee /usr/local/bin/warp-rotate-once >/dev/null <<'R'
        #!/bin/bash
        set -e
        STACK="${1:-dual}"
        D=/var/lib/wgcf
        [ -f /etc/wireguard/warp.conf ] && cp /etc/wireguard/warp.conf "$D/last.conf"

        wg-quick down warp >/dev/null 2>&1 || true
        rm -f "$D/wgcf-account.toml"

        # jitter to reduce same allocation hit
        sleep $((RANDOM % 7 + 2))

        cd "$D" && wgcf register --accept-tos >/dev/null 2>&1 || {
          [ -f "$D/last.conf" ] && cp "$D/last.conf" /etc/wireguard/warp.conf && wg-quick up warp >/dev/null 2>&1
          exit 1
        }

        warp-wg-build "$STACK" >/dev/null 2>&1 || {
          [ -f "$D/last.conf" ] && cp "$D/last.conf" /etc/wireguard/warp.conf && wg-quick up warp >/dev/null 2>&1
          exit 1
        }

        wg-quick up warp >/dev/null 2>&1 || {
          [ -f "$D/last.conf" ] && cp "$D/last.conf" /etc/wireguard/warp.conf && wg-quick up warp >/dev/null 2>&1
          exit 1
        }

        for _ in $(seq 1 8); do
          curl -4sf --connect-timeout 3 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE '^warp=(on|plus)$' && exit 0
          sleep 1
        done

        [ -f "$D/last.conf" ] && cp "$D/last.conf" /etc/wireguard/warp.conf && wg-quick up warp >/dev/null 2>&1
        exit 1
        R
        sudo chmod +x /usr/local/bin/warp-rotate-once

        get_ip4() { curl -4s --connect-timeout 5 https://api.ipify.org || true; }

        BASE_IP="$(get_ip4)"
        [ -n "$BASE_IP" ] || BASE_IP="N/A"
        echo "[warp] base IPv4: $BASE_IP"

        changed=0
        current="$BASE_IP"

        for n in 1 2 3; do
          echo "[warp] rotate attempt $n/3"
          sudo warp-rotate-once "$STACK" || { echo "WARP failed on attempt $n"; exit 1; }

          new_ip="$(get_ip4)"
          [ -n "$new_ip" ] || new_ip="N/A"
          echo "[warp] IPv4 after attempt $n: $new_ip"

          if [ "$BASE_IP" != "N/A" ] && [ "$new_ip" != "N/A" ] && [ "$new_ip" != "$BASE_IP" ]; then
            changed=1
            current="$new_ip"
            echo "[warp] IPv4 changed on attempt $n"
            break
          fi

          current="$new_ip"
        done

        if [ "$changed" -ne 1 ]; then
          echo "[warp] warning: IPv4 did not change after max 3 attempts"
        fi

        echo "IPv4: $current"
        echo "IPv6: $(curl -6s --connect-timeout 5 https://api64.ipify.org || echo N/A)"
